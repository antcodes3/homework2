<!doctype html>
<!-- 
    Name: Anthony Newsome
    File: homework1.html

<html lang="en">
    <head>
        <link rel="stylesheet" href="hw2.css">

        <!-- Load external CSS styles -->
        <title>Patient Registration | Newsome's Clinic</title>
    </head>
    <body>
        <header> 
            <table width="100%">
                <tr>
                    <td valign="top" align="left" width="20%">
                        <div class="image">
                            <img align="center" src="Cliniclogo.png" alt="Newsome's Clinic Logo" width="70px" id="logo"/>
                        </div>
                    </td>

                    <td>
                        <h2>Newsome's Emergency Clinic</h2>
                    </td>

                    <td valign="bottom" align="right" width="20%">
                        Today's Date: <span id="today"></span>
                    </td>
                </tr>
            </table>
        </header>

        <hr>
        <!--Form starts here-->
        <form name="signup" id="signup" form action="thankyou.html">
            <center>
                <!-- FIX: <div class="format" was missing closing > -->
                <div class="format">
                    <table>

                        <tr>
                            <th class="form" colspan="4">Set up a new account</th>
                        </tr>

                        <!-- Patient's name F M L -->
                        <!-- FIX: missing closing </tr> on fname row -->
                        <tr>
                            <td class="td1"><label for="fname">First Name:</label></td>
                            <td>
                                <input type="text"
                                    name="fname"
                                    id="fname"
                                    maxlength="30"
                                    title="Letters, dashes, and apostrophes only"
                                    pattern="[a-zA-Z']{1-30}"
                                    onblur="validateFname()"
                                    required
                                    placeholder="Anthony"
                                    />
                                    <br>
                                    <span class="error" id="fname-error"></span>
                                
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="mname">Middle Initial:</label></td>
                            <td>
                                <input type="text"
                                    name="mname"
                                    id="mname"
                                    minlength="0"
                                    maxlength="1"
                                    title="Letters only"
                                    pattern="[a-zA-Z']{0-1}"
                                    onblur="validateMname()"
                                    placeholder="T"
                                    />
                                    <br>
                                    <span class="error" id="mname-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="lname">Last Name:</label></td>
                            <td>
                                <input type="text"
                                    name="lname"
                                    id="lname"
                                    minlength="1"
                                    maxlength="30"
                                    title="Letters, dashes, and apostrophes only"
                                    pattern="[a-zA-Z']{1-30}"
                                    onblur="validateLname()"
                                    required
                                    placeholder="Newsome"
                                    />
                                    <br>
                                    <span class="error" id="lname-error"></span>
                            </td>
                        </tr>

                        <!-- Gender or sex -->
                        <tr>
                            <td class="td1"><label for="psex">Patient's Sex:</label></td>
                            <td>
                                <input type="radio" id="s1" name="psex" value="Male"/> Male
                                <input type="radio" id="s2" name="psex" value="Female"/> Female
                                <input type="radio" id="s3" name="psex" value="other"/> Other
                            </td>
                        </tr>

                        <!-- Date of Birth -->
                        <tr>
                            <td class="td1"><label for="dob">Date of Birth:</label></td>
                            <td>
                                <input 
                                type="date" 
                                id="dob" 
                                name="dob"
                                onblur="validateDob()"
                                required
                                />
                                <br>
                                <span class="error" id="dob-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="ssn">SSN:</label></td>
                            <td>
                                <input type="password"
                                    minlength="11"
                                    maxlength="11"
                                    name="ssn"
                                    id="ssn"
                                    required
                                    title="Numbers Only"
                                    placeholder="123-45-6789"
                                    onblur="validateSsn()"
                                    />
                                    <br>
                                    <span class="error" id="ssn-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <th colspan="4"><hr></th>
                        </tr>
                        <tr>
                            <th colspan="4">Patient Contact Information</th>
                        </tr>

                        <!-- Address -->
                        <tr>
                            <td class="td1"><label for="address1">Address:</label></td>
                            <td>
                                <input type="text"
                                    name="address1"
                                    id="address1"
                                    minlength="2"
                                    maxlength="40"
                                    title="Letters, dashes, and apostrophes only"
                                    required
                                    placeholder="7001 Corporate Dr, Houston, TX 77036"
                                    onblur="validateAddress1()"
                                    />
                                    <br>
                                    <span class="error" id="address1-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="address2">Address Line 2:</label></td>
                            <td>
                                <input type="text"
                                    name="address2"
                                    id="address2"
                                    maxlength="40"
                                    title="Please enter your address line 2 (optional)"
                                    placeholder="12121 Westheimer Rd, Houston, TX 77077"
                                />
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="city">City:</label></td>
                            <td>
                                <input type="text"
                                    name="city"
                                    id="city"
                                    minlength="1"
                                    maxlength="30"
                                    title="Please enter your city"
                                    required
                                    placeholder="Houston"
                                    onblur="validateCity()"
                                    />
                                    <br>
                                    <span class="error" id="city-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="state">State:</label></td>
                            <td>
                                <select name="state" id="state">
                                    <option selected disabled>Please Select One</option>
                                    <option value="AL">Alabama</option>
                                    <option value="AK">Alaska</option>
                                    <option value="AZ">Arizona</option>
                                    <option value="AR">Arkansas</option>
                                    <option value="CA">California</option>
                                    <option value="CO">Colorado</option>
                                    <option value="CT">Connecticut</option>
                                    <option value="DE">Delaware</option>
                                    <option value="DC">District of Columbia</option>
                                    <option value="FL">Florida</option>
                                    <option value="GA">Georgia</option>
                                    <option value="GU">Guam</option>
                                    <option value="HI">Hawaii</option>
                                    <option value="ID">Idaho</option>
                                    <option value="IL">Illinois</option>
                                    <option value="IN">Indiana</option>
                                    <option value="IA">Iowa</option>
                                    <option value="KS">Kansas</option>
                                    <option value="KY">Kentucky</option>
                                    <option value="LA">Louisiana</option>
                                    <option value="ME">Maine</option>
                                    <option value="MD">Maryland</option>
                                    <option value="MA">Massachusetts</option>
                                    <option value="MI">Michigan</option>
                                    <option value="MN">Minnesota</option>
                                    <option value="MS">Mississippi</option>
                                    <option value="MO">Missouri</option>
                                    <option value="MT">Montana</option>
                                    <option value="NE">Nebraska</option>
                                    <option value="NV">Nevada</option>
                                    <option value="NH">New Hampshire</option>
                                    <option value="NJ">New Jersey</option>
                                    <option value="NM">New Mexico</option>
                                    <option value="NY">New York</option>
                                    <option value="NC">North Carolina</option>
                                    <option value="ND">North Dakota</option>
                                    <option value="OH">Ohio</option>
                                    <option value="OK">Oklahoma</option>
                                    <option value="OR">Oregon</option>
                                    <option value="PA">Pennsylvania</option>
                                    <option value="PR">Puerto Rico</option>
                                    <option value="RI">Rhode Island</option>
                                    <option value="SC">South Carolina</option>
                                    <option value="SD">South Dakota</option>
                                    <option value="TN">Tennessee</option>
                                    <option value="TX">Texas</option>
                                    <option value="UT">Utah</option>
                                    <option value="VT">Vermont</option>
                                    <option value="VA">Virginia</option>
                                    <option value="WA">Washington</option>
                                    <option value="WV">West Virginia</option>
                                    <option value="WI">Wisconsin</option>
                                    <option value="WY">Wyoming</option>
                                </select>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="zcode">Zip Code:</label></td>
                            <td>
                                <input type="text"
                                    name="zcode"
                                    id="zcode"
                                    maxlength="5"
                                    title="Numbers only"
                                    required
                                    placeholder="77036"
                                    onblur="validateZcode()"
                                    />
                                    <br>
                                    <span class="error" id="zcode-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="email">Email Address:</label></td>
                            <td>
                                <input type="text"
                                    name="email"
                                    id="email"
                                    maxlength="30"
                                    required
                                    maxlength="30"
                                    title="Please enter your email address"
                                    placeholder="antman@gmail.com"
                                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
                                    onblur="validateEmail()"
                                    />
                                    <br>
                                    <span class="error" id="email-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="phonenum">Phone Number:</label></td>
                            <td>
                                <input type="text"
                                    name="phonenum"
                                    id="phonenum"
                                    pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                                    required
                                    maxlength="30"
                                    title="Please enter your phone number"
                                    required
                                    placeholder="713-555-1234"
                                    onblur="validatePhonenum()"
                                    />
                                    <br>
                                    <span class="error" id="phonenum-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <th colspan="4"><hr></th>
                        </tr>

                        <!-- Patient background -->
                        <tr>
                            <th colspan="4">Patient Background Information</th>
                        </tr>

                        <tr>
                            <td class="td1"><label for="vacc">Background Information:</label></td>
                            <!-- FIX: first input was type="text" instead of type="radio" -->
                            <td>
                                <input type="radio" id="v1" name="vacc" value="Yes"/> Yes
                                <input type="radio" id="v2" name="vacc" value="No"/> No
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="insur">Do you have Insurance:</label></td>
                            <td>
                                <input type="radio" id="i1" name="insur" value="Yes"/> Yes
                                <input type="radio" id="i2" name="insur" value="No"/> No
                            </td>
                        </tr>

                        <!-- FIX: missing closing </td></tr> on medical history row -->
                        <tr>
                            <td class="td1"><label for="pat_hist">Have you ever had any medical history:</label></td>
                            <td>
                                <input type="checkbox" id="option1" value="Diabetes"/>
                                <label for="option1">Diabetes</label>

                                <input type="checkbox" id="option2" value="Hypertension"/>
                                <label for="option2">Hypertension</label>

                                <input type="checkbox" id="option3" value="Depression"/>
                                <label for="option3">Depression</label>

                                <input type="checkbox" id="option4" value="Meningitis"/>
                                <label for="option4">Meningitis</label>

                                <input type="checkbox" id="option5" value="Cancer"/>
                                <label for="option5">Cancer</label>

                                <input type="checkbox" id="option6" value="Other"/>
                                <label for="option6">Other</label>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1" align="right">
                                <label for="notes">If you selected any of the choices, <br> please explain:</label>
                            </td>
                            <td>
                                <textarea
                                    rows="4"
                                    cols="50"
                                    maxlength="500"
                                    id="notes"
                                    name="notes"
                                    title="Please write a description of the symptoms you are experiencing"
                                    placeholder="(Insert text here...)"
                                ></textarea>
                                <span id="description_text"></span>
                            </td>
                        </tr>

                        <!-- Slider HTML Coding -->
                        <tr>
                            <td class="td1"><label for="range">How would you rate your pain level?<br/>(Rate from 0-10, 10 being the most amount of pain):</label></td>
                            <td>
                                <input type="range"
                                    name="range"
                                    id="range"
                                    min="0"
                                    max="10"
                                    value="0"
                                />
                                <span id="range-slider"></span>
                            </td>
                        </tr>

                        <tr>
                            <th colspan="4">Make a Patient Account:</th>
                        </tr>

                        <tr>
                            <td class="td1"><label for="username">Username ID:</label></td>
                            <td>
                                <input 
                                type="text"
                                name="username"
                                id="username"
                                minlength="5"
                                maxlength="20"
                                required
                                title="Username must contain at least 5 characters, adn not start witha number"
                                placeholder="anthonyn11"
                                onblur="validateUsername()"
                                />
                                <br>
                                <span class="error" id="username-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="pass">Password:</label></td>
                            <td>
                                <input 
                                type="password"
                                name="pass"
                                id="pass"
                                minlength="10"
                                maxlength="30"
                                required
                                title="Password must contain at least 10 characters, one uppercase letter, one number, and lowercase letter, and one special character"
                                placeholder="Registration"
                                onblur="validatePass()"
                                oninput="validatePass()"
                                onfocus="validatePass()"
                                />
                                </br>
                                <span class="error" id="pass1-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1"><label for="c_pass">Confirm Password:</label></td>
                            <td>
                                <input type="password"
                                    name="c_pass"
                                    id="c_pass"
                                    minlength="10"
                                    maxlength="30"
                                    required
                                    title="Please re-enter your password"
                                    placeholder="Registration"
                                    onblur="validatePass()"
                                    oninput="validatePass()"
                                    onfocus="validatePass()"
                                    />
                                    </br>
                                    <span class="error" id="pass2-error"></span>
                            </td>
                        </tr>

                        <tr>
                            <td class="td1" colspan="4">
                                <center>
                                    <input type="submit" name="submit" id="submit" style="font-family: 'Courier New', Courier, monospace;">
                                    &nbsp;&nbsp;&nbsp;
                                    <input type="reset" name="reset" id="reset" style="font-family: 'Courier New', Courier, monospace;">
                                    &nbsp;&nbsp;&nbsp;
                                    <input type="button" name="review" id="review" value="Review" style="font-family: 'optima', sans-serif;" onclick="reviewInput()"
                                </center>
                            </td>
                        </tr>

                    </table>
                </div>
                <div class="pass-message">
                    <span id="msg1"></span> <br/>
                    <span id="msg2"></span> <br/>
                    <span id="msg3"></span> <br/>
                    <span id="msg4"></span> <br/>
                    <span id="msg5"></span> <br/>
                    <span id="msg6"></span> <br/>
                    <span id="msg7"></span> <br/>
                    <span id="pass2-error"></span> <br/>
                </div>
                    <center>
                    <p id="showInput"></p>
                    </center>
                
                </center>
        </form>
        
        <!-- Footer goes here -->
        <footer>
            <p id="footer"> &#169 2026 Newsome's Emergency Clinic | <a href="https://nextcare.com/locations/tx/?utm_source=google-ads&utm_campaign=&utm_agid=178703144606&utm_term=walk%20in%20medical%20near%20me&creative=753959368680&device=c&placement=&gad_source=1&gad_campaignid=22588215004&gbraid=0AAAAAD1AHoCBXNIwJgkx8a8EEUhLjt6nI&gclid=CjwKCAiA2PrMBhA4EiwAwpHyC8_8WS32YJ19hhbmdW8Z0Rn2IaaIoT09_k6IkxyloJ7ao_ixRgUXmhoC7tkQAvD_BwE" target="_blank" rel="noopener noreferrer">Contact Us!</a></p>
        </footer>

        <script src="hw2.js"></script>
    </body>
</html>
